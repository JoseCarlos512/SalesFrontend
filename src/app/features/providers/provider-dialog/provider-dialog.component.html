<h2 mat-dialog-title>{{ isEdit ? 'Editar' : 'Nuevo' }} Proveedor</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline">
      <mat-label>Nombre / Razón Social</mat-label>
      <input matInput formControlName="nombre">
      <mat-error>Requerido</mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>RUC</mat-label>
      <input matInput formControlName="ruc" maxlength="11">
      <mat-error>RUC de 11 dígitos requerido</mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Dirección</mat-label>
      <input matInput formControlName="direccion">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Teléfono</mat-label>
      <input matInput formControlName="telefono">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email">
      <mat-error>Email inválido</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="form.invalid">Guardar</button>
</mat-dialog-actions>
