<div class="list-header">
  <h2>Nuevo Ingreso</h2>
  <button mat-button routerLink="/income"><mat-icon>arrow_back</mat-icon> Volver</button>
</div>

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Proveedor</mat-label>
          <mat-select formControlName="idProvider">
            <mat-option *ngFor="let p of providers" [value]="p.id">{{ p.nombre }} — {{ p.ruc }}</mat-option>
          </mat-select>
          <mat-error>Requerido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Tipo Comprobante</mat-label>
          <input matInput formControlName="tipoComprobante">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Serie</mat-label>
          <input matInput formControlName="serieComprobante">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>N° Comprobante</mat-label>
          <input matInput formControlName="numComprobante">
          <mat-error>Requerido</mat-error>
        </mat-form-field>
      </div>

      <h3>Detalle</h3>
      <div formArrayName="detalles">
        <div *ngFor="let detail of detalles.controls; let i = index" [formGroupName]="i" class="detail-row">
          <mat-form-field appearance="outline" class="detail-article">
            <mat-label>Artículo</mat-label>
            <mat-select formControlName="idArticle" (selectionChange)="onArticleChange(i)">
              <mat-option *ngFor="let a of articles" [value]="a.id">{{ a.nombre }}</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline" class="detail-qty">
            <mat-label>Cantidad</mat-label>
            <input matInput type="number" formControlName="cantidad" min="1">
          </mat-form-field>

          <mat-form-field appearance="outline" class="detail-price">
            <mat-label>Precio</mat-label>
            <input matInput type="number" formControlName="precio" min="0" step="0.01">
          </mat-form-field>

          <div class="detail-total">S/ {{ lineTotal(i) | number:'1.2-2' }}</div>

          <button mat-icon-button color="warn" type="button" (click)="removeDetail(i)" [disabled]="detalles.length === 1">
            <mat-icon>remove_circle</mat-icon>
          </button>
        </div>
      </div>

      <button mat-stroked-button type="button" (click)="addDetail()" color="primary">
        <mat-icon>add</mat-icon> Agregar línea
      </button>

      <div class="totals-box">
        <div class="total-line">Total: <strong>S/ {{ total | number:'1.2-2' }}</strong></div>
      </div>

      <div class="action-buttons">
        <button mat-button type="button" routerLink="/income">Cancelar</button>
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Registrar Ingreso</span>
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
